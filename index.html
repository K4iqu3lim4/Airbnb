<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Airbnb</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header class="cabecalho">

        <!-- LOGO -->
        <div class="logo">

            <img 
            class="logo-completa"
            src="./assets/svg/logo1.svg"
            alt="Airbnb">

            <img class="logo-icone" 
            src="./assets/svg/icon.svg" 
            alt="Airbnb">
        
        </div>

        <!-- LINKS -->

        <nav class="links">
            <button class="btn-link">
                <img src="img/acomodacoes.png" alt="" width="60px"> Acomodações
            </button>

            <button class="btn-link">
                <img src="img//balao.png" alt="" width="40px"> Experiências
            </button>

            <button class="btn-link">
                <img src="img/campainha.png" alt="" width="50px"> Serviços
            </button>
        </nav>

        <div class="right-cabecalho">
            <a href="">Torne-se um anfitrião</a>

            <button class="btn-right">
                <img src="img/globo.png" alt="" width="20px">
            </button>

            <button class="btn-right">
                <img src="img/3barras.png" alt="" width="20px">
            </button>
        </div>
    </header>

    <div class="pesquisa">

            <select name="Onde">
                <option value="" selected>Onde</option>
            </select>

            <button>
                Quando
            </button>

            <button>
                Quem
            </button>

    </div>

</body>
</html>
