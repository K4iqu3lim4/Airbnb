<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Airbnb</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header class="cabecalho">

        <!-- LOGO -->
        <div class="logo">

            <img 
            class="logo-completa"
            src="./assets/svg/logo1.svg"
            alt="Airbnb">

            <img class="logo-icone" 
            src="./assets/svg/icon.svg" 
            alt="Airbnb">
        
        </div>

        <!-- LINKS -->

        <nav class="links">
            <button class="btn-link">
                <img src="img/acomodacoes.png" alt="" width="60px"> Acomodações
            </button>

            <button class="btn-link">
                <img src="img//balao.png" alt="" width="40px"> Experiências
            </button>

            <button class="btn-link">
                <img src="img/campainha.png" alt="" width="50px"> Serviços
            </button>
        </nav>

        <div class="right-cabecalho">
            <a href="">Torne-se um anfitrião</a>

            <button class="btn-right">
                <img src="img/globo.png" alt="" width="20px">
            </button>

            <button class="btn-right">
                <img src="img/3barras.png" alt="" width="20px">
            </button>
        </div>
    </header>

    <!-- Barra de Pesquisa -->

    <div class="pesquisa">

        <div class="barra-pesquisa">

            <select name="Onde">
                 <option value="" selected>Onde</option>
            </select>

            <button class="btn-quando">
                <span>Quando</span>
                <span>Insira as datas</span>
            </button>

             <button class="btn-pesquisa">

                <span>Quem</span>

                <a href="" class="lupa"><img src="img/lupa.png" alt=""></a> 
            </button>

        </div>

    </div>


    <div class="primeiro">
            <h2>Acomodações muito procuradas em Guarujá</h2>

            <div>
                <button></button>
                <button></button>
            </div>

    </div>


    <div class="acomodacoes">

        <div class="cards">

            <div class="card">

                <div class="imagem-sequencia">
                    <img src="./img/Casas&apes/casa1.avif" alt="">

                    <span class="tag">
                        Preferido dos Hóspedes
                    </span>

                    <button class="favorito">♡</button>

                </div>

                <div class="info">
                    <h3> Casa · Guarujá </h3>

                    <p>15-17 de jun</p>

                    <p> Total: R$5.450 · ★ 4,96</p>

                </div>

            </div>
        </div>
    </div>
</body>
</html>
